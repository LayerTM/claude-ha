name: Dependabot auto-merge

# Automatically merges Dependabot pull requests for minor and patch updates once
# all required status checks pass. Anything else -- major version bumps or updates
# whose type cannot be determined -- is left for manual review (fail-closed).

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0

      # Allowlist (fail-closed): only merge when the update type is explicitly
      # minor or patch. An empty/undetermined update-type does NOT match, so an
      # ambiguous update is held for review instead of merged.
      - name: Enable auto-merge for minor and patch updates
        if: ${{ steps.metadata.outputs.update-type == 'version-update:semver-minor' || steps.metadata.outputs.update-type == 'version-update:semver-patch' }}
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
