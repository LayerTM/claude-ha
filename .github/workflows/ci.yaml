name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly, to catch drift in Home Assistant / hassfest / HACS.
    - cron: "0 4 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.14"

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hacs/action@main
        with:
          category: integration

  lint-and-test:
    name: Lint, type-check and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements_test.txt
      - name: Ruff (lint)
        run: ruff check custom_components tests scripts
      - name: Ruff (format)
        run: ruff format --check custom_components tests scripts
      - name: mypy (strict)
        run: mypy custom_components/claude_ha
      - name: pytest
        run: |
          pytest \
            --cov=custom_components.claude_ha \
            --cov-report=term-missing \
            --cov-fail-under=100

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Scan for secrets and personal data
        run: python scripts/secret_scan.py .
