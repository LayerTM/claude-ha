name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly, to catch drift in Home Assistant / hassfest / HACS.
    - cron: "0 4 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # Brand assets are bundled locally and submitted separately to
          # home-assistant/brands; ignore the CDN check until that PR merges.
          ignore: brands

  lint-and-test:
    name: Lint, type-check and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements_test.txt
      - name: Ruff (lint)
        run: ruff check custom_components tests
      - name: Ruff (format)
        run: ruff format --check custom_components tests
      - name: mypy
        run: mypy custom_components/claude_ha
      - name: pytest
        run: |
          pytest \
            --cov=custom_components.claude_ha \
            --cov-report=term-missing \
            --cov-fail-under=95

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
