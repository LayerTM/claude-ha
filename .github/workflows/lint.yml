name: lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install ruff
        run: pip install "ruff==0.15.20"
      - name: Ruff (lint)
        run: ruff check custom_components tests scripts
      - name: Ruff (format)
        run: ruff format --check custom_components tests scripts
