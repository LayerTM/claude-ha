version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    labels: ["dependencies"]
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    labels: ["dependencies"]
    groups:
      python-dependencies:
        patterns: ["*"]
        update-types: ["minor", "patch"]
