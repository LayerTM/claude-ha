# Dependabot configuration.
#
# Groups intentionally omit `update-types`: with patterns:["*"], adding an
# update-types filter silently suppresses major-version PRs upstream
# (dependabot/dependabot-core#14202). Majors therefore group in with minor/patch,
# and the dependabot-auto-merge workflow's fail-closed guard holds any group PR
# containing a major for manual review; minor/patch-only groups auto-merge.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    labels: ["dependencies"]
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    labels: ["dependencies"]
    groups:
      python-dependencies:
        patterns: ["*"]
