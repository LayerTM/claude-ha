# Run: pip install pre-commit && pre-commit install
repos:
  - repo: local
    hooks:
      - id: secret-scan
        name: secret / PII scan
        entry: python scripts/secret_scan.py
        language: system
        pass_filenames: false
        always_run: true
      # mypy (strict) — mirrors the CI `tests` gate so a local commit catches what
      # CI catches. Uses the environment's installed mypy + Home Assistant (keep the
      # env in lockstep with requirements_test.txt so results match CI).
      - id: mypy
        name: mypy (strict)
        entry: mypy custom_components/claude_ha
        language: system
        pass_filenames: false
        always_run: true

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=512]
